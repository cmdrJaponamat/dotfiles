ecosystem:no_update_news=true
# System binds #
$mainMod=SUPER

bindm=$mainMod,mouse:272,movewindow
bindm=$mainMod,mouse:273,resizewindow
bind=$mainMod SHIFT,S,exec,~/.config/hypr/scripts/screenshot
bind=,Print,exec,~/.config/hypr/scripts/screenshot2
bind=$mainMod,Print,exec,~/.config/hypr/scripts/screenshot
bind=,XF86MonBrightnessUp,exec,light -A 15
bind=,XF86MonBrightnessDown,exec,light -U 15
bind=,XF86AudioRaiseVolume,exec,amixer set Master 5%+
bind=,XF86AudioLowerVolume,exec,amixer set Master 5%-
bind=,XF86AudioMute,exec,amixer set Master toggle
# bind=$mainMod,f,workspaceopt,allfloat
bind=$mainMod,f,fullscreen
bind=$mainMod,Q,killactive,
bind=$mainMod,K, exec, hyprctl kill
bind=$mainMod,R, exec, hyprctl reload
bind=$mainMod,M,exit,
#bind=$mainMod,S,togglefloating,
bind=$mainMod,S,togglesplit,
bind=$mainMod,P,pseudo,
bind=$mainMod,X,exec,~/.local/bin/color-pick
bind=$mainMod,L,exec,~/.config/hypr/scripts/lock
bind=$mainMod,W,exec,~/.config/hypr/scripts/wall
bind=$mainMod CTRL,W,exec,~/.config/hypr/scripts/wallVim
bind=$mainMod,left,movefocus,l
bind=$mainMod,right,movefocus,r
bind=$mainMod,up,movefocus,u
bind=$mainMod,down,movefocus,d
bind=$mainMod,1,workspace,1
bind=$mainMod,2,workspace,2
bind=$mainMod,3,workspace,3 
bind=$mainMod,4,workspace,4
bind=$mainMod,5,workspace,5
bind=$mainMod,6,workspace,6
bind=$mainMod,7,workspace,7
bind=$mainMod,8,workspace,8
bind=$mainMod,9,workspace,9
bind=$mainMod,0,workspace,10
bind=$mainMod SHIFT,up,swapwindow, u
bind=$mainMod SHIFT,down,swapwindow,d 
bind=$mainMod SHIFT,left,swapwindow, l
bind=$mainMod SHIFT,right,swapwindow, r
bind=$mainMod SHIFT,1,movetoworkspace,1
bind=$mainMod SHIFT,2,movetoworkspace,2
bind=$mainMod SHIFT,3,movetoworkspace,3
bind=$mainMod SHIFT,4,movetoworkspace,4
bind=$mainMod SHIFT,5,movetoworkspace,5
bind=$mainMod SHIFT,6,movetoworkspace,6
bind=$mainMod SHIFT,7,movetoworkspace,7
bind=$mainMod SHIFT,8,movetoworkspace,8
bind=$mainMod SHIFT,9,movetoworkspace,9
bind=$mainMod SHIFT,0,movetoworkspace,10
#bind=$mainMod mouse_down,workspace,e+1
#bind=$mainMod mouse_up,workspace,e-1
bind=$mainMod,g,togglegroup
bind=$mainMod,tab,changegroupactive
#bindl=,switch:Lid Switch,exec,~/.config/hypr/scripts/lock
bindl=,switch:Lid Switch,exec,systemctl suspend


# Binds to launch programs

bind=CTRL,2,exec,code
bind=$mainMod,E,exec,nemo
bind=$mainMod,space,exec,~/.config/rofi/launchers/type-2/launcher.sh
bind=$mainMod,RETURN,exec,alacritty
