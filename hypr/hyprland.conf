# Globals #
monitor=,preferred,auto,auto
# wsbind=1,eDP-1
#exec-once=waybar
exec-once=hyprctl setcursor Bibata-Modern-Ice 1
exec-once=$HOME/.config/hypr/autostart
exec-once=dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
input {
    kb_layout=us,ru
    kb_variant=
    kb_model=
    kb_options=grp:alt_shift_toggle
    kb_rules=

    follow_mouse=1

    touchpad {
        natural_scroll=true
    }
}

misc{
    
}

general {
#    sensitivity=1.0 # for mouse cursor
    gaps_in=3
    gaps_out=5
    border_size=0
    col.active_border=0xfff5c2e7
    col.inactive_border=0xff45475a
#    apply_sens_to_raw=0 # whether to apply the sensitivity to raw input (e.g. used by games where you aim using your mouse)9
#    damage_tracking=full # leave it on full unless you hate your GPU and want to make it suffer
}


#blur_enabled = true

decoration {
#    blur_ignore_opacity = 1
#    blur_new_optimizations = true
#    multisample_edges = true
#    drop_shadow = true
#    shadow_range=4
#    shadow_render_power=3
#    #col.shadow= 0x33000000
#    col.shadow_inactive=0x22000000
    rounding=16
    active_opacity= 0.90
    inactive_opacity= 0.70
    
    blur {
  	  enabled = true
  	  size = 2 
  	  passes = 4
      new_optimizations=true
      brightness=0.0
      #vibrancy=1.0
    }
    #blur=true
    #blur_size=2 # minimum 1
    #blur_passes=4 # minimum 1, more passes = more resource intensive.
   # Your blur "amount" is blur_size * blur_passes, but high blur_size (over around 5-ish) will produce artifacts.
   # if you want heavy blur, you need to up the blur_passes.
   # the more passes, the more you can up the blur_size without noticing artifacts.
}



animations {
    enabled=true
    # bezier=overshot,0.05,0.9,0.1,1.1 # Version 1
    # bezier=overshot,0.13,0.99,0.29,1.09 # Version 2
    bezier= overshot,0,0.61,0.22,1.12 #Current active
    animation=windows,1,3.8,default,slide 
    animation=border,1,4,default
    animation=fade,1,4,default
    animation=workspaces,1,3.8,overshot,slidevert
}
input{
  touchpad {
    #disable_while_typing=true
    drag_lock=true
  }
}

dwindle {
    pseudotile=true # enable pseudotiling on dwindle
    force_split=0
    preserve_split=true
#    col.group_border=0xff89dceb
#    col.group_border_active=0xfff9e2af
    
}

master{
    
}

#gestures {
#    workspace_swipe=yes
#    workspace_swipe_fingers=3
#    workspace_swipe_distance=100
#    workspace_swipe_min_speed_to_force=10
#}
#gesture = 3, left, workspace, next 
#gesture = 3, right, workspace,
gesture = 3, vertical, workspace



